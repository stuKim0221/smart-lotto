name: Update Lotto Data

on:
  schedule:
    - cron: '50 11 * * 6'   # 매주 토요일 11:50 UTC = 토요일 20:50 KST
  workflow_dispatch:

concurrency:
  group: update-lotto-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        persist-credentials: true

    # 🔹 실행 시작 시 로컬을 원격 main과 완전히 동일하게 맞춤
    - name: Sync to origin/main (pre)
      shell: bash
      run: |
        set -e
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch origin main
        git checkout main
        git reset --hard origin/main

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests pandas

    - name: Run data update script
      run: python scripts/update_lotto_data.py

    # 🔹 커밋 후 rebase → push, 실패 시 재시도(+최후 1회 lease 강제)
    - name: Commit and push if changed
      shell: bash
      run: |
        set -e
        git config user.name 'GitHub Actions Bot'
        git config user.email 'actions@github.com'

        git add draw_kor.csv
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Auto-update lotto data - $(date -u)"

        # 최대 3회 재시도: 원격 최신을 얹고 push
        for i in 1 2 3; do
          git fetch origin main
          git pull --rebase origin main || true
          if git push origin HEAD:main; then
            echo "Pushed successfully"
            exit 0
          fi
          echo "Push rejected, retry #$i..."
          sleep 3
        done

        # 최후: --force-with-lease (남의 최신 커밋을 덮지 않도록 보호)
        echo "Final attempt with --force-with-lease"
        git fetch origin main
        git pull --rebase origin main || true
        git push --force-with-lease origin HEAD:main
