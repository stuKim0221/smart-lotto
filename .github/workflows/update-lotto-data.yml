name: Update Lotto Data

on:
  schedule:
    - cron: '50 11 * * 6'   # 매주 토요일 11:50 UTC = 토요일 20:50 KST
  workflow_dispatch:

concurrency:
  group: update-lotto-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        persist-credentials: true

    # 🔹 실행 시작 시 로컬을 원격 main과 완전히 동일하게 맞춤
    - name: Sync to origin/main (pre)
      shell: bash
      run: |
        set -e
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch origin main
        git checkout main
        git reset --hard origin/main

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests pandas

    # 🔹 데이터 업데이트 스크립트 실행
    - name: Run data update script
      run: python scripts/update_lotto_data.py

    # 🔹 파일 변경사항을 자동으로 감지하고 커밋 및 푸시
    - name: Commit files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update lotto data - $(date -u)"
